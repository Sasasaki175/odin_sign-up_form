<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <aside class="side-banner">
      <img class="banner-image" src="images/halie-west-25xggax4bSA-unsplash.jpg" alt="banner-background">
      <div class="banner-logo">
        <img class="banner-icon" src="images/odin-lined.png" alt="odin logo">
        <div class="banner-text">ODIN</div>
      </div>
      <div class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank" rel="noreferrer">Halie West</a> on <a href="https://unsplash.com/" target="_blank" rel="noreferrer">Unsplash</a></div>
    </aside>
    <main class="main-content">
      <form action="">
        <div class="form-container">
          <section class="form-top">
            <div class="form-top-text">
              <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
              <p>You <em>know</em> you want to.</p>
            </div>
          </section>
          <section class="form-mid">
            <h3>Let's do this!</h3>
            <div class="form-group">
              <div class="form-row">
                <div class="field">
                  <label for="first-name">FIRST NAME</label>
                  <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="field">
                  <label for="last-name">LAST NAME</label>
                  <input type="text" id="last-name" name="last-name" required>
                </div>
              </div>
              <div class="form-row">
                <div class="field">
                  <label for="email">EMAIL</label>
                  <input type="email" id="email" name="email" required>
                </div>
                <div class="field">
                  <label for="phone">PHONE NUMBER</label>
                  <input type="tel" id="phone" name="phone-number">
                </div>
              </div>
              <div class="form-row">
                <div class="field">
                  <label for="password">PASSWORD</label>
                  <input type="password" id="password" name="password" required>
                </div>
                <div class="field">
                  <label for="confirm-password">CONFIRM PASSWORD</label>
                  <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
              </div>
            </div>
          </section>
          <section class="form-bottom">
            <button type="submit">
              Create Account
            </button>
            <div class="login-link">
              Already have an account? <a href="#">Log in</a>
            </div>
          </section>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
